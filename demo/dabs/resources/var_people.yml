variables:
  dev_catalog_name:
    description: The catalog name for development environment
    type: string
    default: ravi_dlt_meta_uc
  prod_catalog_name:
    description: The catalog name for production environment
    type: string
    default: ravi_dlt_meta_uc
  sdp_meta_schema:
    description: The schema name for the pipelines
    type: string
    default: sdp_meta_dataflowspecs_demo_d65f39ed6b6d4881977c595ee90e14f9
  bronze_schema:
    description: The schema name for the bronze pipelines
    type: string
    default: sdp_meta_bronze_demo_d65f39ed6b6d4881977c595ee90e14f9
  silver_schema:
    description: The schema name for the silver pipelines
    type: string
    default: sdp_meta_silver_demo_d65f39ed6b6d4881977c595ee90e14f9
  photon_enabled:
    description: Whether Photon is enabled for the pipelines
    type: bool
    default: true
  serverless_enabled:
    description: Whether serverless mode is enabled for the pipelines
    type: bool
    default: true
  bronze_dataflowspecTable:
    description: The table name for the bronze data flow specification
    type: string
    default: bronze_dataflowspec_table
  silver_dataflowspecTable:
    description: The table name for the silver data flow specification
    type: string
    default: silver_dataflowspec_table
  author:
    description: The author of the import
    type: string
    default: ravi.gawai@databricks.com
  people_onboarding_file_path:
    description: The path to the onboarding file for people
    type: string
    default: /Volumes/ravi_dlt_meta_uc/sdp_meta_dataflowspecs_demo_d65f39ed6b6d4881977c595ee90e14f9/dlt_meta_files/demo/dabs/conf/yml/onboarding_bronze_silver_people.yml
  people_fanout_onboarding_file_path:
    description: The path to the onboarding file for people
    type: string
    default: /Volumes/ravi_dlt_meta_uc/sdp_meta_dataflowspecs_demo_d65f39ed6b6d4881977c595ee90e14f9/dlt_meta_files/demo/dabs/conf/yml/onboarding_silver_fanout_people.yml
  dummy_param:
    description: A dummy parameter for testing purposes
    type: string
    default: Hello Bronze 2
  version:
    description: The version of the data flow specification
    type: string
    default: v1
  uc_enabled:
    description: Whether Unity Catalog is enabled for the pipelines
    type: bool
    default: true
  dev_development_enabled:
    description: Whether development mode is enabled for the pipelines
    type: bool
    default: true
  prod_development_enabled:
    description: Whether production development mode is enabled for the pipelines
    type: bool
    default: false
  sdp_meta_wheel_path:
    description: On-volume path to the locally-built sdp-meta wheel uploaded by demo/generate_dabs_resources.py.
      Referenced by the onboarding job's serverless dependency list and by the pipeline
      notebooks via spark.conf.get('sdp_meta_whl'). Used because the package is not
      yet published to PyPI.
    type: string
    default: /Volumes/ravi_dlt_meta_uc/sdp_meta_dataflowspecs_demo_d65f39ed6b6d4881977c595ee90e14f9/dlt_meta_files/wheels/databricks_labs_sdp_meta-0.0.11-py3-none-any.whl
